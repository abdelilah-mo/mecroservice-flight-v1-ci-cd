name: CI Pipeline with Sonar

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./flight-service

      - name: Build project
        run: npm run build
        working-directory: ./flight-service

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
        with:
          projectBaseDir: ./flight-service
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}